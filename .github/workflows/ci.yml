name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─── Job 1: Build & Test ─────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: saas_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        working-directory: "Enterprise SaaS-Billing-Identity-Platform"
        run: mvn clean verify -B
        env:
          DB_HOST: localhost
          DB_NAME: saas_db
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: "Enterprise SaaS-Billing-Identity-Platform/target/surefire-reports/"

  # ─── Job 2: Docker Build & Push ──────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: "./Enterprise SaaS-Billing-Identity-Platform"
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/enterprise-saas-platform:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/enterprise-saas-platform:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
